[build]
  # 1. 安装前端依赖并生成 vendor/（mediapipe wasm，gitignore 不提交）
  # 2. 用 Netlify 自动提供的 $URL 变量替换 index.html 里的域名占位符
  command = """
    cd frontend && npm install && cd .. && \
    mkdir -p vendor/mediapipe/wasm && \
    cp frontend/node_modules/@mediapipe/tasks-vision/vision_bundle.mjs vendor/mediapipe/ && \
    cp frontend/node_modules/@mediapipe/tasks-vision/wasm/* vendor/mediapipe/wasm/ && \
    sed -i "s|https://your-site.netlify.app|${URL}|g" index.html && \
    wget -q -O pose_landmarker_lite.task \
      'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task'
  """
  publish = "."     # 项目根目录作为静态资源目录

[build.environment]
  NODE_VERSION = "20"

# 安全响应头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# WASM 文件必须带正确 MIME 类型，否则浏览器拒绝执行
[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
