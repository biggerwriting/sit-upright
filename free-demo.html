  if (!running) {
    if (landmarker) {
      btn.textContent = t('btn-start')
    } else {
      btn.textContent = t('btn-loading')
    }
  } else {
    btn.textContent = t('btn-stop')
  }
}

let currentLang = detectLang()

// ──────────────────────────────────────────────────────────────
// 3. DOM 引用
// ──────────────────────────────────────────────────────────────
const video              = document.getElementById('video')
const canvas             = document.getElementById('canvas')
const ctx                = canvas.getContext('2d')
const badge              = document.getElementById('status-badge')
const btn                = document.getElementById('btn')
const alertAudio         = document.getElementById('alert-audio')
const goodEl             = document.getElementById('good-secs')
const badEl              = document.getElementById('bad-secs')
const totalEl            = document.getElementById('total-secs')
const timelineEl         = document.getElementById('timeline')
const overlay            = document.getElementById('overlay')
const loadingOverlay     = document.getElementById('loading-overlay')
const stateModelLoading  = document.getElementById('state-model-loading')
const stateModelError    = document.getElementById('state-model-error')
const modelLoadingStage  = document.getElementById('model-loading-stage')
const modelLoadingBar    = document.getElementById('model-loading-bar')

// ──────────────────────────────────────────────────────────────
// 4. 状态
// ──────────────────────────────────────────────────────────────
let landmarker    = null
let detectTimer   = null
let tickTimer     = null
let running       = false
let lastIsHunch   = false

let goodSecs      = 0
let badSecs       = 0
let continuousBad = 0
let lastVoiceAt   = null

let segments      = []
let curSegType    = null
let curSegDur     = 0

// ──────────────────────────────────────────────────────────────
// 5. 坐姿分析
// ──────────────────────────────────────────────────────────────
function analyzePosture(lms) {
  const nose   = lms[0]
  const lSh    = lms[11]
  const rSh    = lms[12]
  const shMidY = (lSh.y + rSh.y) / 2
  const headShoulderDist = shMidY - nose.y
  const noseBelowShoulder = nose.y > shMidY
  return headShoulderDist < HUNCH_THRESHOLD || noseBelowShoulder
}

// ──────────────────────────────────────────────────────────────
// 6. 语音提醒
// ──────────────────────────────────────────────────────────────
function playAudio() {
  alertAudio.currentTime = 0
  alertAudio.play().catch(() => {})
}

// ──────────────────────────────────────────────────────────────
// 7. 时间轴渲染
// ──────────────────────────────────────────────────────────────
function renderTimeline(container, segs) {
  const total = segs.reduce((s, g) => s + g.dur, 0)
  if (total === 0) { container.innerHTML = ''; return }
  container.innerHTML = segs.map(seg => {
    const pct = (seg.dur / total * 100).toFixed(2)
    return `<div class="seg-${seg.type}" style="flex:${pct} 0 0;min-width:2px" title="${seg.type}:${seg.dur}s"></div>`
  }).join('')
}

// ──────────────────────────────────────────────────────────────
// 8. 每秒统计 tick（无配额逻辑）
// ──────────────────────────────────────────────────────────────
function tick() {
  const isHunch = lastIsHunch

  if (isHunch) {
    badSecs++
    continuousBad++
  } else {
    goodSecs++
    continuousBad = 0
    lastVoiceAt   = null
  }

  // 更新 badge
  if (!isHunch) {
    badge.className = 'good'
    badge.textContent = t('badge-good')
  } else if (continuousBad >= ALERT_BAD_SECONDS) {
    badge.className = 'warn'
    badge.textContent = t('badge-warn').replace('{n}', continuousBad)
  } else {
    badge.className = 'bad'
    badge.textContent = t('badge-bad')
  }

  // 语音提醒
  if (isHunch && continuousBad >= ALERT_BAD_SECONDS) {
    if (lastVoiceAt === null || continuousBad - lastVoiceAt >= ALERT_REPEAT_SECS) {
      playAudio()
      lastVoiceAt = continuousBad
    }
  }

  // 更新数字
  const type  = isHunch ? 'bad' : 'good'
  const total = goodSecs + badSecs
  goodEl.innerHTML  = `${goodSecs}<small style="font-size:.7em">s</small>`
  badEl.innerHTML   = `${badSecs}<small style="font-size:.7em">s</small>`
  totalEl.innerHTML = `${total}<small style="font-size:.7em">s</small>`

  // 更新时间轴段
  if (type === curSegType) {
    curSegDur++
    segments[segments.length - 1].dur = curSegDur
  } else {
    curSegType = type
    curSegDur  = 1
    segments.push({ type, dur: 1 })
  }
  renderTimeline(timelineEl, segments)
}

// ──────────────────────────────────────────────────────────────
// 9. 推理循环（setInterval 200ms，后台标签页可用）
// ──────────────────────────────────────────────────────────────
function loop() {
  if (!landmarker || !running) return
  if (video.readyState < 2 || video.videoWidth === 0) return

  canvas.width  = video.videoWidth
  canvas.height = video.videoHeight
  const tsMs = performance.now()

  let result
  try { result = landmarker.detectForVideo(video, tsMs) }
  catch { return }

  ctx.clearRect(0, 0, canvas.width, canvas.height)

  if (result.landmarks.length > 0) {
    const lms = result.landmarks[0]
    const w = canvas.width, h = canvas.height

    ctx.strokeStyle = 'rgba(100,220,100,.9)'
    ctx.lineWidth = 2
    for (const [i,j] of CONNECTIONS) {
      ctx.beginPath()
      ctx.moveTo(lms[i].x*w, lms[i].y*h)
      ctx.lineTo(lms[j].x*w, lms[j].y*h)
      ctx.stroke()
    }
    ctx.fillStyle = 'rgb(60,160,255)'
    for (const idx of KEY_IDXS) {
      ctx.beginPath()
      ctx.arc(lms[idx].x*w, lms[idx].y*h, 5, 0, Math.PI*2)
      ctx.fill()
    }

    lastIsHunch = analyzePosture(lms)
  }
}

// ──────────────────────────────────────────────────────────────
// 10. 开始 / 停止
// ──────────────────────────────────────────────────────────────
async function startDetection() {
  btn.disabled = true
  btn.textContent = t('btn-stop') // 即将启动

  let stream
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
  } catch {
    badge.className = ''
    badge.textContent = t('badge-camera-denied')
    btn.textContent = t('btn-start')
    btn.disabled = false
    return
  }

  video.srcObject = stream
  await video.play()

  // 重置统计
  goodSecs = badSecs = continuousBad = 0
  lastVoiceAt = null
  segments = []; curSegType = null; curSegDur = 0
  goodEl.innerHTML = badEl.innerHTML = totalEl.innerHTML = '0'
  timelineEl.innerHTML = ''

  running = true
  detectTimer = setInterval(loop, 200)
  tickTimer   = setInterval(tick, 1000)

  btn.textContent = t('btn-stop')
  btn.className = 'stop'
  btn.disabled = false
}

function stopDetection() {
  running = false
  if (detectTimer) { clearInterval(detectTimer); detectTimer = null }
  if (tickTimer)   { clearInterval(tickTimer);   tickTimer   = null }

  const stream = video.srcObject
  if (stream) stream.getTracks().forEach(tr => tr.stop())
  video.srcObject = null

  badge.className = ''
  badge.textContent = t('badge-stopped')

  showReport()

  btn.textContent = t('btn-start')
  btn.className = 'start'
}

btn.addEventListener('click', () => {
  if (running) stopDetection()
  else         startDetection()
})

// ──────────────────────────────────────────────────────────────
// 11. 报告弹窗
// ──────────────────────────────────────────────────────────────
function fmtTime(s) {
  const m = Math.floor(s / 60)
  const r = s % 60
  return m > 0 ? `${m}m ${r}s` : `${r}s`
}

function showReport() {
  const total = goodSecs + badSecs
  const pct   = total === 0 ? 0 : Math.round(goodSecs / total * 100)

  document.getElementById('r-total').textContent = fmtTime(total)
  document.getElementById('r-good').textContent  = `${goodSecs}s (${pct}%)`
  document.getElementById('r-bad').textContent   = `${badSecs}s (${100-pct}%)`
  document.getElementById('r-pct').textContent   = `${pct}%`
  renderTimeline(document.getElementById('report-timeline'), segments)

  overlay.classList.add('show')
}

document.getElementById('report-close').addEventListener('click', () => {
  overlay.classList.remove('show')
})

// ──────────────────────────────────────────────────────────────
// 12. 覆盖层管理
// ──────────────────────────────────────────────────────────────
function showLoadingState(state) {
  stateModelLoading.style.display = state === 'loading' ? '' : 'none'
  stateModelError.style.display   = state === 'error'   ? '' : 'none'
  loadingOverlay.classList.add('show')
}

function hideLoadingOverlay() {
  loadingOverlay.classList.remove('show')
}

function setModelStage(text, progressPct) {
  modelLoadingStage.textContent    = text
  modelLoadingBar.style.width      = progressPct + '%'
}

function readyToDetect() {
  hideLoadingOverlay()
  badge.textContent = t('badge-ready')
  btn.textContent   = t('btn-start')
  btn.disabled      = false
}

// ──────────────────────────────────────────────────────────────
// 13. 初始化 MediaPipe（模型就绪后直接解锁，无鉴权）
// ──────────────────────────────────────────────────────────────
async function init() {
  showLoadingState('loading')
  setModelStage(t('model-loading-init'), 15)

  try {
    const { PoseLandmarker, FilesetResolver } = await import(
      './vendor/mediapipe/vision_bundle.mjs'
    )

    setModelStage(t('model-loading-wasm'), 45)
    const vision = await FilesetResolver.forVisionTasks(
      './vendor/mediapipe/wasm'
    )

    setModelStage(t('model-loading-model'), 80)
    landmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: MODEL_PATH },
      runningMode: 'VIDEO',
      numPoses: 1,
      minPoseDetectionConfidence: 0.6,
      minPosePresenceConfidence: 0.6,
      minTrackingConfidence: 0.6,
    })

    setModelStage(t('model-loading-done'), 100)

  } catch (e) {
    console.error('[init] 模型加载失败:', e)

    const msg = e?.message ?? ''
    let hint
    if (msg.includes('404') || msg.includes('Failed to fetch model')) {
      hint = t('model-error-404')
    } else if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
      hint = t('model-error-net')
    } else {
      hint = t('model-error-unknown') + ': ' + msg.slice(0, 80)
    }

    document.getElementById('model-error-msg').textContent = hint
    showLoadingState('error')

    badge.textContent = t('model-error-title')
    btn.textContent   = t('model-error-title')

    throw e
  }
}

// 重试按钮
document.getElementById('model-retry-btn').addEventListener('click', () => {
  setModelStage(t('model-loading-init'), 5)
  showLoadingState('loading')
  init().then(() => readyToDetect()).catch(e => console.error('[retry]', e))
})

// ──────────────────────────────────────────────────────────────
// 14. 语言切换器交互
// ──────────────────────────────────────────────────────────────
const langBtn  = document.getElementById('lang-btn')
const langMenu = document.getElementById('lang-menu')

langBtn.addEventListener('click', e => {
  e.stopPropagation()
  langMenu.classList.toggle('open')
})

document.addEventListener('click', () => langMenu.classList.remove('open'))

langMenu.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation()
    const lang = e.currentTarget.dataset.lang
    localStorage.setItem('lang', lang)
    applyLang(lang)
    langMenu.classList.remove('open')
  })
})

// ──────────────────────────────────────────────────────────────
// 15. 启动
// ──────────────────────────────────────────────────────────────

// 先应用语言（让静态 data-i18n 节点正确显示）
applyLang(currentLang)

// 加载模型后直接解锁，无需鉴权
init().then(() => readyToDetect()).catch(e => console.error('[init]', e))
</script>
</body>
</html>
